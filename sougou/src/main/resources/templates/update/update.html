<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<link rel="stylesheet" type="text/css" href="../css/common.css">
		<title>更新</title>
	</head>
	<body>
		<div id="wapper">
			<div class="menu">
				<a th:href="@{/}">メニュー</a><br>
				<a th:href="@{/list}">メンバ一覧</a><br>
			</div>
			<div class="menu">
				<h2>更新画面</h2>
				<p>以下のデータの更新を行います</p>
			</div>
			<form th:action="@{/updateConf}" method="post" th:object="${member}">
				<table class="ct">
					<tr>
						<th>&nbsp;</th>
						<th>&nbsp;</th>
					</tr>
					<tr>
						<th>社員ID</th>
						<td>
							<input type="text" th:field="*{memberId}">
						</td>
					</tr>
					<tr>
						<th>氏名</th>
						<td>
							<input type="text" th:field="*{name}">
						</td>
					</tr>
					<tr>
						<th>年齢</th>
						<td>
							<input type="text" th:field="*{age}">
						</td>
					</tr>
					<tr>
						<th>性別</th>
						<td>
							男<input type="radio" name="sex" value="0" checked>
							女<input type="radio" name="sex" value="1">
						</td>
					</tr>
					<tr>
						<th>住所</th>
						<td><input type="text" th:field="*{address}"></td>
					</tr>
					<tr>
						<th>電話番号</th>
						<td><input type="text" th:field="*{tel}"></td>
					</tr>
					<tr>
						<th>メールアドレス</th>
						<td><input type="text" th:field="*{mail}"></td>
					</tr>
					<tr>
						<th>役職</th>
						<td>
							<select th:field="*{positionName}">
								<option 
									th:each="position : ${positions}"
									th:text="${position.positionName}"
									th:value="${position.positionName}">
								</option>
							</select>
						</td>
					</tr>
					<tr>
						<th>事業所</th>
						<td>
							<select th:field="*{placeName}">
								<option 
									th:each="place : ${places}"
									th:text="${place.placeName}"
									th:value="${place.placeName}">
								</option>
							</select>
						</td>
					</tr>
				</table>
				<div class="menu">
					<input type="submit" value="更新">
					&nbsp;&nbsp;&nbsp;&nbsp
					<input type="submit" th:formaction="@{/list}" value="戻る">
				</div>
			</form>
		</div>
	</body>
</html>
