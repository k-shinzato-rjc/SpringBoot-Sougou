<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<link rel="stylesheet" type="text/css" href="../css/common.css">
		<title>削除</title>
	</head>
	<body>
		<div id="wapper">
			<div class="menu">
				<a th:href="@{/}">メニュー</a><br>
				<a th:href="@{/list}">メンバ一覧</a><br>
			</div>
			<div class="menu">
				<h2>削除確認画面</h2>
				<p>以下のデータを削除します&nbsp;よろしいですか</p>
			</div>
			<form th:action="@{/deleteComp}" method="post" th:object="${member}">
				<table class="ct">
					<tr>
						<th>社員ID</th>
						<td>
							<span th:text="*{memberId}"></span>
							<input type="hidden" name="memberId" th:value="*{memberId}">
						</td>
					</tr>
					<tr>
						<th>氏名</th>
						<td>
							<span th:text="*{name}"></span>
							<input type="hidden" name="name" th:value="*{name}">
						</td>
					</tr>
					<tr>
						<th>年齢</th>
						<td>
							<span th:text="*{age}"></span>
							<input type="hidden" name="age" th:value="*{age}">
						</td>
					</tr>
					<tr>
						<th>性別</th>
						<td>
							<span th:text="*{sex} == 0 ? '男' : '女'"></span>
							<input type="hidden" name="sex" th:value="*{sex}">
						</td>
					</tr>
					<tr>
						<th>住所</th>
						<td>
							<span th:text="*{address}"></span>
							<input type="hidden" name="address" th:value="*{address}">
						</td>
					</tr>
					<tr>
						<th>電話番号</th>
						<td>
							<span th:text="*{tel}"></span>
							<input type="hidden" name="tel" th:value="*{tel}">
						</td>
					</tr>
					<tr>
						<th>メールアドレス</th>
						<td>
							<span th:text="*{mail}"></span>
							<input type="hidden" name="mail" th:value="*{mail}">
						</td>
					</tr>
					<tr>
						<th>役職</th>
						<td>
							<span th:text="*{positionName}"></span>
							<input type="hidden" name="positionName" th:value="*{positionName}">
						</td>
					</tr>
					<tr>
						<th>事業所</th>
						<td>
							<span th:text="*{placeName}"></span>
							<input type="hidden" name="placeName" th:value="*{placeName}">
						</td>
					</tr>
				</table>
				<div class="menu">
					<input type="submit" value="削除">
					&nbsp;&nbsp;&nbsp;&nbsp
					<input type="submit" th:formaction="@{/list}" value="戻る">
				</div>
			</form>
		</div>
	</body>
</html>
