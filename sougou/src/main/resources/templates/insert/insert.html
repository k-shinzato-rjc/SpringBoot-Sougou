<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<link rel="stylesheet" type="text/css" href="../css/common.css">
		<title>新規登録</title>
	</head>
	<body>
		<div id="wapper">
			<div class="menu">
				<a th:href="@{/first}">メニュー</a><br>
			</div>
			<div class="menu">
				<h2>新規登録画面</h2>
			</div>
			<form action="./insertConf.html" method="post">
				<table class="ct">
					<tr>
						<th>社員ID</th>
						<td><input type="text" name="id" value=""></td>
					</tr>
					<tr>
						<th>氏名</th>
						<td><input type="text" name="name" value=""></td>
					</tr>
					<tr>
						<th>年齢</th>
						<td><input type="text" name="age" value=""></td>
					</tr>
					<tr>
						<th>性別</th>
						<td>
							男<input type="radio" name="sexFlg" value="0" checked >
							女<input type="radio" name="sexFlg" value="1">
						</td>
					</tr>
					<tr>
						<th>住所</th>
						<td><input type="text" name="address" value=""></td>
					</tr>
					<tr>
						<th>電話番号</th>
						<td><input type="text" name="tel" value=""></td>
					</tr>
					<tr>
						<th>メールアドレス</th>
						<td><input type="text" name="mail" value=""></td>
					</tr>
					<tr>
						<th>役職</th>
						<td>
							<select name="positionId">
								<option value="">社長</option>
								<option value="">部長</option>
								<option value="">課長</option>
								<option value="">一般社員</option>
								<option value="">アルバイト</option>
							</select>
						</td>
					</tr>
					<tr>
						<th>事業所</th>
						<td>
							<select name="placeId">
								<option value="">東京本社</option>
								<option value="">大阪支社</option>
								<option value="">福岡支社</option>
								<option value="">岡山支社</option>
								<option value="">熊本支社</option>
							</select>
						</td>
					</tr>
				</table>
				<div class="menu">
					<input type="submit" value="登録">
				</div>
			</form>
		</div>
	</body>
</html>
